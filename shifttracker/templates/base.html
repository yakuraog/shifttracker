<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ShiftTracker Admin{% endblock %}</title>
    <!-- Bootstrap 5.3.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <!-- htmx 2.0.4 -->
    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"
            integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+"
            crossorigin="anonymous"></script>
    <style>
        body { min-height: 100vh; }
        .sidebar {
            min-height: 100vh;
            background-color: #212529;
        }
        .sidebar .nav-link {
            color: #adb5bd;
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            color: #ffffff;
            background-color: #343a40;
            border-radius: 0.25rem;
        }
        .sidebar-brand {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffffff;
        }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <nav class="col-md-2 d-md-block sidebar py-3 px-2">
            <div class="mb-4 px-2 sidebar-brand">ShiftTracker</div>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" href="/admin/">
                        Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/admin/groups/">
                        Groups
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/admin/employees/">
                        Employees
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/admin/caption-rules/">
                        Caption Rules
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/admin/review/">
                        Review Queue
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/admin/shifts/">
                        Shift Table
                    </a>
                </li>
            </ul>
            <!-- Logout button at bottom of sidebar -->
            <div class="mt-auto pt-4 px-2">
                <form method="post" action="/admin/logout">
                    <button type="submit" class="btn btn-outline-secondary btn-sm w-100">
                        Logout
                    </button>
                </form>
            </div>
        </nav>

        <!-- Main content -->
        <main class="col-md-10 ms-sm-auto px-md-4 py-4">
            {% block content %}{% endblock %}
        </main>
    </div>
</div>

<!-- Bootstrap 5.3.3 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmqy9BPeV8VcSM9+1GGLIjDYCsRT"
        crossorigin="anonymous"></script>
</body>
</html>

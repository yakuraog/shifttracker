{% for binding in bindings %}
<tr id="binding-{{ binding.id }}">
    <td>{{ binding.group.name if binding.group else '—' }}</td>
    <td>{{ binding.sheet_row or '—' }}</td>
    <td>
        <button class="btn btn-sm btn-outline-danger"
                hx-delete="/admin/employees/{{ employee.id }}/bindings/{{ binding.id }}"
                hx-target="closest tr"
                hx-swap="outerHTML"
                hx-confirm="Убрать эту привязку?">
            Убрать
        </button>
    </td>
</tr>
{% else %}
<tr id="no-bindings-row">
    <td colspan="3" class="text-center text-muted">Привязок пока нет.</td>
</tr>
{% endfor %}

{% extends "base.html" %}

{% block title %}Главная — ShiftTracker{% endblock %}

{% block content %}
<h2 class="mb-4">Панель управления</h2>

<div class="row g-4">
    <div class="col-md-4">
        <div class="card text-bg-success">
            <div class="card-body">
                <h5 class="card-title">Принято сегодня</h5>
                <p class="card-text display-6">{{ stats.accepted_today }}</p>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-bg-warning">
            <div class="card-body">
                <h5 class="card-title">Ожидают проверки</h5>
                <p class="card-text display-6">{{ stats.pending_review }}</p>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-bg-danger">
            <div class="card-body">
                <h5 class="card-title">Ошибки сегодня</h5>
                <p class="card-text display-6">{{ stats.errors_today }}</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
